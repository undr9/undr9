version: "3.9"

services:
  undr9:
    build:
      context: .
      dockerfile: Dockerfile
    image: undr9:local
    init: true
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      UNDR9_BIND_ADDRESS: "0.0.0.0:8080"
      UNDR9_ADMIN_API_KEY: "${UNDR9_ADMIN_API_KEY:?set UNDR9_ADMIN_API_KEY}"
      UNDR9_WRITER_API_KEY: "${UNDR9_WRITER_API_KEY:?set UNDR9_WRITER_API_KEY}"
      UNDR9_READER_API_KEY: "${UNDR9_READER_API_KEY:?set UNDR9_READER_API_KEY}"
    volumes:
      - undr9_data:/var/lib/undr9/data
    command: ["undr9", "serve", "--root", "/var/lib/undr9/data", "--bind", "0.0.0.0:8080"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  undr9_data:
